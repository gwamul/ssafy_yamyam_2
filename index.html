<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>YamYam - 헬스 케어 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">
        <!-- 좌측 아이콘 사이드바 (기존 유지) -->
        <nav class="icon-sidebar">
            <div class="sidebar-header"></div>
            <div class="sidebar-icons">
                <a href="index.html" class="sidebar-icon">🍽️</a>
                <a href="user.html" class="sidebar-icon">
                    👥
                </a>
                <a href="food.html" class="sidebar-icon">
                    🍴
                </a>
                <a href="challenge.html" class="sidebar-icon">
                    🎯
                </a>
            </div>
        </nav>

        <!-- 메인 컨텐츠 영역 -->
        <main class="main-content video-layout">
            <!-- 배경 영상 컨테이너 -->
            <div class="video-background">
                <div class="overlay"></div>
                <video autoplay muted loop playsinline class="bg-video">
                    <source src="./image/salad.mp4" type="video/mp4">
                </video>
            </div>

            <!-- 중앙 텍스트 컨텐츠 -->
            <div class="hero-text-center">
                <h1 class="brand-logo">YamYam</h1>
                <p class="main-copy">당신의 식단을 관리해드릴게요</p>
                <button class="btn-start" onclick="startApp()">시작하기</button>
                <script>
                    function startApp() {
                        // 1. 메인 컨텐츠에 'slide-up' 클래스 추가
                        const main = document.querySelector('.main-content');
                        main.classList.add('slide-up');

                        // 전체 바디 배경 서서히 어둡게/사라지게 하여 앱 전환 느낌 부여
                        document.body.style.transition = 'opacity 0.8s ease';
                        document.body.style.opacity = '0';

                        // 2. 애니메이션이 끝나는 시점(약 0.8초 후)에 페이지 이동
                        setTimeout(() => {
                            window.location.href = 'food.html'; // 이동할 식단 관리 페이지 파일명
                        }, 800);
                    }
                </script>
            </div>


        </main>
    </div>

</body>

</html>
