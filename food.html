<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Food</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
      crossorigin="anonymous" referrerpolicy="no-referrer" />  
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/food/food.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="./js/food/food.js"></script>
</head>

<body>

    <div class="app-container">
        <nav class="icon-sidebar">
            <div class="sidebar-header">

    </div>

    <div class="sidebar-icons">

        <a href="index.html" class="sidebar-icon" >
            <i class="fa-solid fa-house"></i>
        </a>

        <a href="user.html" class="sidebar-icon">
            <i class="fa-regular fa-user"></i>
        </a>

        <a href="food.html" class="sidebar-icon">
            <i class="fa-solid fa-bowl-food"></i>
        </a>

        <a href="challenge.html" class="sidebar-icon">
            <i class="fa-solid fa-arrow-up-right-dots"></i>
        </a>

    </div>
        </nav>

        <aside class="secondary-sidebar d-flex flex-column h-100">
            <!-- 1. 좌측 사이드바: 날짜 및 식단 목록 -->
            <div class="pb-3 mb-3 border-bottom d-flex flex-column gap-2">
                <div>
                    <h5 class="fw-bold mb-2" style="color: var(--primary-green, #2b8a3e);">🍽️ 오늘의 식단</h5>
                </div>
                <div class="d-flex justify-content-between align-items-center bg-light rounded px-2 py-1">
                    <button class="btn btn-sm btn-link text-decoration-none text-dark fs-5 p-0"
                        id="btnPrevDay">◀</button>
                    <input type="date"
                        class="form-control form-control-sm border-0 bg-transparent fw-bold p-0 text-center"
                        id="currentDateDisplay" style="width:130px; font-size:1.1rem; cursor:pointer;" title="날짜 변경">
                    <button class="btn btn-sm btn-link text-decoration-none text-dark fs-5 p-0"
                        id="btnNextDay">▶</button>
                </div>
            </div>

            <div class="daily-summary p-3 bg-white rounded shadow-sm mb-3 text-center border">
                <div class="text-muted small fw-bold">총 칼로리</div>
                <div class="fs-4 fw-bolder text-primary"><span id="dailyTotalCalories">0</span> <span
                        class="fs-6 fw-normal text-dark">kcal</span></div>
            </div>

            <div class="meal-blocks-container flex-grow-1 overflow-auto" id="mealBlocksContainer">
                <!-- JS에서 식단 블록 렌더링 -->
                <div class="text-center text-muted small mt-4">저장된 식단이 없습니다.</div>
            </div>

            <div class="mt-3 pt-3 border-top">
                <button class="btn btn-primary w-100 fw-bold py-2 shadow-sm" id="btnAddNewMeal">
                    <span class="fs-5 me-1">+</span> 음식 추가하기
                </button>
            </div>
        </aside>

        <main class="main-content page-enter d-flex" style="flex:1;">

            <!-- 2. 중앙 메인: 개별 식단 상세 정보 (우측 패널 모달화로 인해 전체 너비 사용) -->
            <div id="viewDietPanel" class="p-4 d-flex flex-column"
                style="flex: 1; overflow-y: auto; background-color: #fafbfc;">
                <header class="content-header mb-4">
                    <h2 class="h4 fw-bold">오늘 먹은 음식</h2>
                    <p class="subtitle text-muted">좌측에서 식단을 선택하면 상세 정보가 나타납니다.</p>
                </header>

                <div id="viewDietContent"
                    class="flex-grow-1 d-flex flex-column justify-content-center align-items-center text-muted">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">🥗</div>
                    <h5>식단을 선택해주세요</h5>
                </div>
            </div>
        </main>

    </div>

    <!-- 모달: 음식 검색 및 새 식단 추가/수정 -->
    <div class="modal fade" id="addDietModal" tabindex="-1" aria-labelledby="addDietModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header text-white" style="background-color: var(--primary-green, #16a34a);">
                    <h5 class="modal-title fw-bold" id="addDietModalLabel">무엇을 또 먹었나요?</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 bg-white">
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label small text-muted mb-1 fw-bold">식사 구분</label>
                            <select class="form-select form-select-sm" id="dietType">
                                <option value="아침">아침</option>
                                <option value="점심">점심</option>
                                <option value="저녁">저녁</option>
                                <option value="간식">간식</option>
                            </select>
                        </div>
                    </div>

                    <h6 class="mb-2 fw-bold text-dark">🔍 음식 검색</h6>
                    <div class="input-group mb-3 shadow-sm rounded">
                        <input type="text" id="foodSearch" class="form-control form-control-sm border-end-0"
                            placeholder="예: 불고기 버거">
                        <button class="btn btn-sm text-white px-3" style="background-color: #16a34a;"
                            id="btnFoodSearch">검색</button>
                    </div>

                    <!-- 검색 결과 표시 영역 -->
                    <ul id="foodResult" class="list-group list-group-flush small mb-4 border rounded"
                        style="max-height: 200px; overflow-y: auto;">
                        <!-- JS에서 채워짐 -->
                    </ul>

                    <h6 class="fw-bold mt-4 mb-2 border-bottom pb-2 text-dark"
                        style="border-color: #16a34a !important;">🛒 구성 중인 음식 목록</h6>
                    <ul id="selectedFoods" class="list-group list-group-flush mb-3 small border rounded bg-light">
                        <li class="list-group-item text-center text-muted py-4">선택된 음식이 없습니다.</li>
                    </ul>

                    <div id="stagingNutrition" class="nutrition-totals d-none mb-1 p-3 rounded bg-light border">
                        <!-- JS에서 합계 계산 표시 -->
                    </div>
                </div>
                <div class="modal-footer bg-light border-top-0 pt-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button class="btn text-white fw-bold px-4 shadow-sm" style="background-color: #16a34a;"
                        id="btnSaveDiet">이 식단 기록하기</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
