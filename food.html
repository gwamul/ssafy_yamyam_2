<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Food</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="./js/food.js"></script>
</head>

<body>

    <div class="app-container">

        <nav class="icon-sidebar">
            <div class="sidebar-header">

            </div>

            <div class="sidebar-icons">

                <a href="index.html" class="sidebar-icon">🍽️</a>

                <a href="user.html" class="sidebar-icon">
                    👥
                </a>

                <a href="food.html" class="sidebar-icon">
                    🍴
                </a>

                <a href="challenge.html" class="sidebar-icon">
                    🎯
                </a>

            </div>
        </nav>

        <main class="main-content page-enter">

            <header class="content-header">
                <h1>식단 관리</h1>
                <p class="subtitle">일일 식단 기록</p>
            </header>

            <div class="diet-controls">

                <input type="date" class="form-control">

                <select class="form-select">
                    <option>전체</option>
                    <option>아침</option>
                    <option>점심</option>
                    <option>저녁</option>
                    <option>간식</option>
                </select>

                <button class="btn btn-primary">검색</button>

            </div>

            <div id="mealList">
                <main class="main-content">
                    <header class="content-header">
                        <h1>식단 관리</h1>
                        <p class="subtitle">나의 하루 영양 밸런스를 확인하세요</p>
                        <button class="btn btn-success float-end" data-bs-toggle="modal" data-bs-target="#dietModal">식단
                            추가하기</button>
                    </header>

                    <!-- 검색 및 필터 -->
                    <div class="diet-controls shadow-sm p-3 mb-4 bg-white rounded">
                        <div class="row g-2">
                            <div class="col-md-4"><input type="date" class="form-control" id="searchDate"></div>
                            <div class="col-md-3">
                                <select class="form-select" id="searchType">
                                    <option value="all">전체 식사</option>
                                    <option value="morning">아침</option>
                                    <option value="lunch">점심</option>
                                    <option value="dinner">저녁</option>
                                    <option value="snack">간식</option>
                                </select>
                            </div>
                            <div class="col-md-3"><input type="text" class="form-control" placeholder="음식명 검색..."></div>
                            <div class="col-md-2"><button class="btn btn-primary w-100">조회</button></div>
                        </div>
                    </div>

                    <!-- 식단 리스트 영역 -->
                    <div id="mealList" class="row g-4">
                        <!-- 예시 데이터: 식단 ID 200 (유산슬 등) -->
                        <div class="col-12">
                            <div class="card diet-card">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <span class="badge bg-info text-dark">간식</span>
                                    <span class="date text-muted">2025-03-18</span>
                                    <div>
                                        <button class="btn btn-sm btn-outline-secondary">수정</button>
                                        <button class="btn btn-sm btn-outline-danger">삭제</button>
                                    </div>
                                </div>
                                <div class="card-body">
                                    <h5 class="card-title">총 에너지: 1,114 kcal</h5>
                                    <ul class="list-group list-group-flush">
                                        <li class="list-group-item d-flex justify-content-between">
                                            <span>유산슬 (220g)</span>
                                            <span class="text-primary">189.2 kcal</span>
                                        </li>
                                        <li class="list-group-item d-flex justify-content-between">
                                            <span>불고기 버거 (180g)</span>
                                            <span class="text-primary">444.6 kcal</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>

            </div>

        </main>

    </div>

</body>

</html>
